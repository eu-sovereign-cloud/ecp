# SECA Roles for e2e benchmark tests.
# All resources go in the hashed tenant namespace for "test-tenant".
# The admin role grants access to every provider used in the test suite;
# the narrower roles cover individual scenarios and edge cases.
---
apiVersion: authorization.v1.secapi.cloud/v1
kind: Role
metadata:
  name: e2e-admin
  namespace: f7ec6f666803cd9d9814d4c055217581afbff53f3c35fd6c5e6b444d
spec:
  permissions:
    - provider: seca.region
      resources: ["*"]
      verb: ["*"]
    - provider: seca.authorization
      resources: ["*"]
      verb: ["*"]
    - provider: seca.storage
      resources: ["*"]
      verb: ["*"]
    - provider: seca.workspace
      resources: ["*"]
      verb: ["*"]
    - provider: seca.network
      resources: ["*"]
      verb: ["*"]
    - provider: seca.compute
      resources: ["*"]
      verb: ["*"]
---
apiVersion: authorization.v1.secapi.cloud/v1
kind: Role
metadata:
  name: e2e-region-viewer
  namespace: f7ec6f666803cd9d9814d4c055217581afbff53f3c35fd6c5e6b444d
spec:
  permissions:
    - provider: seca.region
      resources: ["v1/regions"]
      verb: ["get", "list"]
---
apiVersion: authorization.v1.secapi.cloud/v1
kind: Role
metadata:
  name: e2e-storage-viewer
  namespace: f7ec6f666803cd9d9814d4c055217581afbff53f3c35fd6c5e6b444d
spec:
  permissions:
    - provider: seca.storage
      resources: ["block-storages", "images", "storage-skus"]
      verb: ["get", "list"]
---
apiVersion: authorization.v1.secapi.cloud/v1
kind: Role
metadata:
  name: e2e-workspace-editor
  namespace: f7ec6f666803cd9d9814d4c055217581afbff53f3c35fd6c5e6b444d
spec:
  permissions:
    - provider: seca.workspace
      resources: ["workspaces"]
      verb: ["get", "list", "put", "delete"]
---
apiVersion: authorization.v1.secapi.cloud/v1
kind: Role
metadata:
  name: e2e-compute-operator
  namespace: f7ec6f666803cd9d9814d4c055217581afbff53f3c35fd6c5e6b444d
spec:
  permissions:
    # post.start only — exercises verb sub-action matching (post.restart would be denied).
    - provider: seca.compute
      resources: ["instances/*"]
      verb: ["post.start"]
