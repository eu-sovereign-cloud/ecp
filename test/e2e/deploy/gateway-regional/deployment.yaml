apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-regional-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-regional
  template:
    metadata:
      labels:
        app: gateway-regional
    spec:
      serviceAccountName: gateway-regional-sa
      imagePullSecrets:
      - name: gateway-global-registry-secret
      containers:
      - name: manager
        image: "##IMAGE_NAME##"
        imagePullPolicy: Always
        env:
        - name: REGION
          value: itbg-bergamo
        # Auth toggle env vars (default: dummy authn + cached authz ON).
        # Override at deploy time to change behaviour without rebuilding the image.
        - name: AUTH_ENABLED
          value: "true"
        - name: AUTHZ_ENABLED
          value: "true"
        - name: AUTHZ_IMPL
          value: "cached"
        - name: DUMMY_AUTH_USERS
          value: "/app/users.json"
        ports:
        - containerPort: 40000
          name: dlv
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: users
          mountPath: /app/users.json
          subPath: users.json
          readOnly: true
      volumes:
      - name: users
        configMap:
          name: e2e-dummy-users
