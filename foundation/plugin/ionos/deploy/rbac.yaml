apiVersion: v1
kind: ServiceAccount
metadata:
  name: ionos-plugin
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ionos-plugin-role
rules:
- apiGroups: ["compute.m.ionoscloud.io"]
  resources: ["datacenters", "volumes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["workspace.v1.secapi.cloud"]
  resources: ["workspaces", "workspaces/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["storage.v1.secapi.cloud"]
  resources: ["block-storages", "block-storages/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["namespaces", "events"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ionos-plugin-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ionos-plugin-role
subjects:
- kind: ServiceAccount
  name: ionos-plugin
  namespace: default
