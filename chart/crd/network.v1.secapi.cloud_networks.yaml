                      rule: self.size() == 0 || (isCIDR(self) && cidr(self).ip().family()
                        == 6)
                type: object
              skuRef:
                description: |-
                  SkuRef Reference to the SKU used by default for all NIC in this Network.
                  Can be overridden by the NIC. The SKU is immutable after the network is created.
                  To change the SKU, the network must be deleted and recreated with the new SKU reference.
                properties:
                  provider:
                    description: Provider Provider of the resource. If not set, the
                      provider is inferred from the context.
                    maxLength: 64
                    type: string
                  region:
                    description: Region Region of the resource. If not set, the region
                      is inferred from the context.
                    maxLength: 64
                    type: string
                  resource:
                    description: |-
                      Resource Resource-specific path identifying the resource within its workspace context.
                      This is the segment of the full URN after the provider, version, tenant, and
                      workspace parts. For a flat resource it is `<type>/<name>`, and for hierarchical
                      (nested) resources it includes the parent path segments:
                        `networks/<network-name>/route-tables/<rt-name>`
                      The provider, tenant, and workspace can be specified as separate fields in this
                      object; they do not need to be repeated here.
                    maxLength: 256
                    minLength: 1
                    type: string
                  tenant:
                    description: Tenant Tenant of the resource. If not set, the tenant
                      is inferred from the context.
                    maxLength: 64
                    type: string
                  workspace:
                    description: Workspace Workspace of the resource. If not set,
                      the workspace is inferred from the context.
                    maxLength: 64
                    type: string
                required:
                - resource
                type: object
                x-kubernetes-validations:
                - message: spec.skuRef is immutable
                  rule: self == oldSelf
            required:
            - cidr
            - skuRef
            type: object
          status:
            description: NetworkStatus defines model for NetworkStatus.
            properties:
