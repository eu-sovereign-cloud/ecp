# Static base compose definition for the ecp devcontainer.
#
# Dynamic, backend-specific flags (user mapping, socket GID, cgroup mounts,
# SELinux security options) live in compose.override.yml, which is generated
# by ci/scripts/devcontainer-init.sh (the devcontainer.json initializeCommand)
# and is gitignored.
#
# All ${VAR} placeholders are populated from .env, which is also generated by
# devcontainer-init.sh and gitignored.

services:
  dev:
    image: ${TOOLS_IMAGE}
    working_dir: /workspace

    # Host networking is required so that the KIND API server (which binds to
    # a random port on 127.0.0.1 of the host network namespace) is reachable
    # from inside the container via kubectl.
    network_mode: host

    # Keep the container alive so the IDE can attach and execute commands.
    command: sleep infinity

    volumes:
      # Workspace: bind-mount the repo root into /workspace.
      # The source is the parent of .devcontainer/ (i.e. the repo root).
      - ..:/workspace

      # Docker-in-Docker via socket mount. HOST_SOCKET is backend-aware:
      # either /var/run/docker.sock (Docker) or the Podman user socket.
      - ${HOST_SOCKET}:/var/run/docker.sock

    environment:
      # Mirror the environment variables that _CTZD_RUN_FLAGS sets today.
      HOME: /workspace/.cache/container-home
      GOPATH: /workspace/.cache/go
      GOCACHE: /workspace/.cache/go-build
      KIND_EXPERIMENTAL_PROVIDER: docker
      # HOST_WORKSPACE is the repo root on the HOST, needed when scripts inside
      # the container launch nested docker run commands that must reference the
      # host path for volume mounts.
      HOST_WORKSPACE: ${HOST_WORKSPACE}
      HOST_SOCKET: ${HOST_SOCKET}
