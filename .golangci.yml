version: "2"
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - depguard
    - durationcheck
    - errchkjson
    - errorlint
    - exhaustive
    - gocheckcompilerdirectives
    - gochecksumtype
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - gosmopolitan
    - importas
    - loggercheck
    - makezero
    - misspell
    - musttag
    - nakedret
    - nilerr
    - nilnesserr
    - noctx
    - prealloc
    - protogetter
    - reassign
    - recvcheck
    - rowserrcheck
    - spancheck
    - sqlclosecheck
    - testifylint
    - unconvert
    - unparam
    - zerologlint
  settings:
    depguard:
      rules:
        # Framework inter-layer DAG (applies when linting framework/* paths).
        # Three-layer DAG: kernel (leaf) ← backend ← (nothing; frontend and backend are peers)
        # "framework ↛ resources" is compiler-enforced (GOWORK=off gate) and
        # lives in framework/.golangci.yml to avoid false-positives in other modules.
        kernel-no-impl:
          files:
            - "**/kernel/**"
          list-mode: lax
          deny:
            - pkg: "github.com/eu-sovereign-cloud/ecp/framework/backend"
              desc: "kernel must not import framework/backend"
            - pkg: "github.com/eu-sovereign-cloud/ecp/framework/frontend"
              desc: "kernel must not import framework/frontend"
        backend-no-frontend:
          files:
            - "**/backend/**"
          list-mode: lax
          deny:
            - pkg: "github.com/eu-sovereign-cloud/ecp/framework/frontend"
              desc: "backend must not import framework/frontend"
        frontend-no-backend:
          files:
            - "**/frontend/**"
          list-mode: lax
          deny:
            - pkg: "github.com/eu-sovereign-cloud/ecp/framework/backend"
              desc: "frontend must not import framework/backend"
    importas:
      # Enforce <resource><layer> short aliases for resource slices.
      # Per-slice aliases are added in Phase C alongside slice creation.
      # Framework packages use longer descriptive aliases where disambiguation is needed.
      no-unaliased: false
      alias: []
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: false
      check-blank: false
    goconst:
      min-len: 3
      min-occurrences: 5
    gocritic:
      disabled-checks:
        - preferFprint
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 32
    gocyclo:
      min-complexity: 20
    lll:
      tab-width: 1
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - gosec
          - scopelint
          - unparam
          - unused
        path: _test(ing)?\.go
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - gosec
          - scopelint
          - unparam
          - unused
        path: test_constants.go
      - linters:
          - unused
        path: test*.go
      - linters:
          - gocritic
        path: _test\.go
        text: (unnamedResult|exitAfterDefer)
      - linters:
          - gocritic
        text: '(hugeParam|rangeValCopy):'
      - linters:
          - staticcheck
        text: 'SA3000:'
      - linters:
          - gosec
        text: 'G101:'
      - linters:
          - gosec
        text: 'G104:'
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
