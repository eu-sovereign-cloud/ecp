name: Pre-Merge

# This workflow is the single entry point for all pull-request checks.
#
# It covers two lifecycles:
#
#   action ∈ {opened, synchronize, reopened}  → build + test + lint + vuln jobs
#   action == closed                           → delete the per-PR builder image
#
# Per-PR builder image lifecycle (merged from the former builder-pr.yaml):
#   - Detect whether any builder input changed vs main.
#   - If NOT changed and :main exists → alias :main as :pr-<N> via
#     `buildx imagetools create --annotation` (unique digest, safe to delete).
#   - If changed or :main missing → full multi-arch rebuild, pushed as :pr-<N>.
#   - On close → delete :pr-<N> (and :pr-<N>-buildcache) from GHCR.
#
# Downstream jobs that run inside the builder container reference:
#   ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
# They must declare `needs: builder-publish-pr` to ensure the tag is ready.
#
# NOTE on checkout ref: every `actions/checkout` in this workflow pins to
# `github.event.pull_request.head.sha` instead of using the default. The
# default on `pull_request` events is `refs/pull/<N>/merge` — a synthetic
# commit merging the PR head onto the current base, which means validation
# runs against "PR + everything new on main since branching." That causes
# surprise failures when main regresses: an unrelated PR merged to main
# turns every other open PR's CI red even though none of them touched the
# broken file. Pinning to head.sha makes CI see exactly the tree the
# contributor sees locally — the same commit they just pushed — so what
# you lint locally is what CI lints. The classic trade-off is that
# semantic merges with main aren't caught; branch protection's
# "require branches up to date before merging" covers that case.
#
# Job execution order (fail-cheap / fail-fast):
#
#   Stage 1 — cheap gates, no deps (parallel)
#     pr-title        Validate PR Title
#     module-diff     Detect Changed Modules
#     branch-rebase   Verify Branch Is Rebased
#
#   Stage 2 — build builder image (gated by stage 1)
#     builder-publish-pr   Provide PR Builder Image
#       needs: [pr-title, module-diff, branch-rebase]
#       skipped when no modules changed → nothing else runs
#
#   Stage 3 — all verification jobs (gated by stage 2, parallel)
#     workspace-verify   Ensure Workspace Is In Sync
#     generate-api       Ensure Generated API Artifacts Are In Sync
#     test / lint / gofmt / vuln / gosec  (per changed module)
#
#   Cleanup — only on action == 'closed', independent of all above
#     builder-cleanup   Cleanup PR Builder Image

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

env:
  BUILDER_IMAGE_REPO: ghcr.io/eu-sovereign-cloud/ecp-builder

permissions:
  contents: read
  packages: write   # push AND delete builder image versions

jobs:
  # ===========================================================================
  # Stage 1: Validate PR Title (conventional commits)
  # ===========================================================================
  pr-title:
    name: Validate PR Title
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Stage 1: Verify PR branch is rebased onto its target
  # ===========================================================================
  branch-rebase:
    name: Verify Branch Is Rebased
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Run branch-rebase-verify
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: make branch-rebase-verify

  # ===========================================================================
  # Stage 1: Detect which modules changed
  # ===========================================================================
  module-diff:
    name: Detect Changed Modules
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
      has_changes: ${{ steps.filter.outputs.changes != '[]' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Generate paths-filter config from go.work
        run: make -s print-paths-filter > .paths-filter.yml
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: .paths-filter.yml

  # ===========================================================================
  # Stage 2: Builder image — publish alias or rebuild for this PR
  # ===========================================================================
  builder-publish-pr:
    name: Provide PR Builder Image
    needs: [pr-title, module-diff, branch-rebase]
    if: github.event.action != 'closed' && needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    concurrency:
      # Cancel in-flight publishes for the same PR when a new commit arrives.
      group: builder-pr-publish-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          # Full history so paths-filter can diff PR HEAD against the base.
          fetch-depth: 0

      - name: Publish per-PR builder image
        uses: ./.github/actions/builder-pr-publish
        with:
          image-repo: ${{ env.BUILDER_IMAGE_REPO }}
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Stage 3: Ensure workspace is in sync (inside builder container)
  # ===========================================================================
  workspace-verify:
    needs: builder-publish-pr
    name: Ensure Workspace Is In Sync
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: 'recursive'
      - name: Run workspace-verify
        run: make workspace-verify

  # ===========================================================================
  # Stage 3: Ensure generated API artifacts are in sync (inside builder container)
  # ===========================================================================
  generate-api:
    needs: builder-publish-pr
    name: Ensure Generated API Artifacts Are In Sync
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: 'recursive'
      - name: Run generate-api-verify
        run: make generate-api-verify

  # ===========================================================================
  # Stage 3: Tests (per changed module, inside builder container)
  # ===========================================================================
  test:
    needs: [module-diff, builder-publish-pr]
    if: github.event.action != 'closed' && needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Test (${{ matrix.module }})
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: 'recursive'
      - name: Run tests
        run: make ${{ matrix.module }}-test

  # ===========================================================================
  # Stage 3: Lint via golangci-lint (per changed module, inside builder container)
  # ===========================================================================
  lint:
    needs: [module-diff, builder-publish-pr]
    if: github.event.action != 'closed' && needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Lint (${{ matrix.module }})
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: 'recursive'
      - name: Run golangci-lint
        run: make ${{ matrix.module }}-lint

  # ===========================================================================
  # Stage 3: Format check via golangci-lint fmt (per changed module)
  #
  # Runs `make <module>-gofmt-check` which invokes `golangci-lint fmt --diff`
  # and fails if any diff is produced. Mirrors the lint/vuln/gosec jobs: one
  # job per changed module, runs inside the per-PR builder image so the
  # golangci-lint version matches GOLANGCI_LINT_VERSION in .config.mk.
  # ===========================================================================
  gofmt:
    needs: [module-diff, builder-publish-pr]
    if: github.event.action != 'closed' && needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Gofmt (${{ matrix.module }})
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: 'recursive'
      - name: Run gofmt check
        run: make ${{ matrix.module }}-gofmt-check

  # ===========================================================================
  # Stage 3: Vulnerability check via govulncheck (per changed module)
  #
  # Runs inside the per-PR builder image so the govulncheck version matches the
  # pinned GOVULNCHECK_VERSION in .config.mk — no @latest drift, no setup-go.
  # The Makefile target (%-vuln in Makefile) sets GOWORK=off to force
  # single-module mode.
  # ===========================================================================
  vuln:
    needs: [module-diff, builder-publish-pr]
    if: github.event.action != 'closed' && needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Vuln (${{ matrix.module }})
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: 'recursive'
      - name: Run vuln
        run: make ${{ matrix.module }}-vuln

  # ===========================================================================
  # Stage 3: Security scanning via gosec (per changed module, inside builder container)
  # ===========================================================================
  gosec:
    needs: [module-diff, builder-publish-pr]
    if: github.event.action != 'closed' && needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Gosec (${{ matrix.module }})
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: 'recursive'
      - name: Run gosec
        run: make ${{ matrix.module }}-gosec

  # ===========================================================================
  # Builder image — cleanup when the PR closes
  # ===========================================================================
  builder-cleanup:
    name: Cleanup PR Builder Image
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    concurrency:
      group: builder-pr-cleanup-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Delete per-PR tags from GHCR
        uses: ./.github/actions/ghcr-delete-pr-tags
        with:
          owner: eu-sovereign-cloud
          package: ecp-builder
          pr-number: ${{ github.event.pull_request.number }}
          token: ${{ secrets.GITHUB_TOKEN }}
