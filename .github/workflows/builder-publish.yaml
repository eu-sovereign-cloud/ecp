name: Publish builder image

# Builds and pushes the multi-arch builder image to ghcr.io whenever any of
# its inputs change on main. After pushing, opens an automated PR that bumps
# .builder-digest so developers and CI pin the new digest deterministically.
#
# Publishing is CI-only: developers never push to ghcr.io.
# Developers pull automatically on the first `make tools-build` / `make dev-build`.
# To build and test the builder locally: make builder-build BUILDER_SOURCE=local
#
# One-time setup (after the first successful run):
#   Go to https://github.com/orgs/eu-sovereign-cloud/packages/container/ecp-builder/settings
#   and set package visibility to Public so anonymous pulls work.

on:
  push:
    branches: [main]
    paths:
      - 'ci/container/builder/**'
      - 'ci/tools/**'
      - 'ci/scripts/**'
      - '.config.mk'
      - 'Makefile'
      - '.github/workflows/builder-publish.yaml'
  workflow_dispatch:

permissions:
  contents: write       # create the digest-bump branch
  packages: write       # push to ghcr.io
  pull-requests: write  # open the bump PR

# Serialise publish runs; never cancel in-progress (the second run benefits
# from the first's registry cache layer).
concurrency:
  group: builder-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA for image tag
        id: sha
        run: echo "short_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: ./.github/actions/builder-build-push
        with:
          tags: |
            ghcr.io/eu-sovereign-cloud/ecp-builder:main
            ghcr.io/eu-sovereign-cloud/ecp-builder:sha-${{ steps.sha.outputs.short_sha }}
          # Registry-based BuildKit cache: speeds up subsequent publishes by
          # reusing unchanged layers without requiring a local cache.
          cache-from: type=registry,ref=ghcr.io/eu-sovereign-cloud/ecp-builder:buildcache
          cache-to: type=registry,ref=ghcr.io/eu-sovereign-cloud/ecp-builder:buildcache,mode=max

      # Write the multi-arch manifest digest so the Makefile can pin it.
      - name: Write digest lock file
        run: |
          printf '%s\n' '${{ steps.build.outputs.digest }}' > .builder-digest
          echo "Digest: $(cat .builder-digest)"

      # Open a PR that bumps .builder-digest on main. Merging the PR is the
      # moment developers adopt the new builder. The merge commit only touches
      # .builder-digest, which is NOT in the paths: filter above, so it does
      # NOT re-trigger this workflow (no infinite loop).
      - name: Open PR to bump .builder-digest
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(builder): bump image digest to sha-${{ steps.sha.outputs.short_sha }}"
          title: "chore(builder): bump builder image digest"
          body: |
            Automated bump after `builder-publish.yaml` pushed a new multi-arch
            image to `ghcr.io/eu-sovereign-cloud/ecp-builder`.

            | Field | Value |
            |-------|-------|
            | Trigger commit | ${{ github.sha }} |
            | Short SHA tag  | `sha-${{ steps.sha.outputs.short_sha }}` |
            | Manifest digest | `${{ steps.build.outputs.digest }}` |
            | Platforms | `linux/amd64`, `linux/arm64` |

            After merging, developers and CI will automatically pull this
            digest on the next `make tools-build` / `make dev-build`.
          branch: ci/bump-builder-digest
          base: main
          add-paths: .builder-digest
          delete-branch: true
          sign-commits: false
