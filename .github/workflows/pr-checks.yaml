name: Workspace CI

# This workflow is the single entry point for all pull-request checks.
#
# It covers two lifecycles:
#
#   action ∈ {opened, synchronize, reopened}  → build + test + lint + vuln jobs
#   action == closed                           → delete the per-PR builder image
#
# Per-PR builder image lifecycle (merged from the former builder-pr.yaml):
#   - Detect whether any builder input changed vs main.
#   - If NOT changed and :main exists → alias :main as :pr-<N> via
#     `buildx imagetools create --annotation` (unique digest, safe to delete).
#   - If changed or :main missing → full multi-arch rebuild, pushed as :pr-<N>.
#   - On close → delete :pr-<N> (and :pr-<N>-buildcache) from GHCR.
#
# Downstream jobs that run inside the builder container reference:
#   ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
# They must declare `needs: builder-publish-pr` to ensure the tag is ready.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

env:
  BUILDER_IMAGE_REPO: ghcr.io/eu-sovereign-cloud/ecp-builder

permissions:
  contents: read
  packages: write   # push AND delete builder image versions

jobs:
  # ===========================================================================
  # Builder image — publish alias or rebuild for this PR
  # ===========================================================================
  builder-publish-pr:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    concurrency:
      # Cancel in-flight publishes for the same PR when a new commit arrives.
      group: builder-pr-publish-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so paths-filter can diff PR HEAD against the base.
          fetch-depth: 0

      - name: Publish per-PR builder image
        uses: ./.github/actions/builder-pr-publish
        with:
          image-repo: ${{ env.BUILDER_IMAGE_REPO }}
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Builder image — cleanup when the PR closes
  # ===========================================================================
  builder-cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    concurrency:
      group: builder-pr-cleanup-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Delete per-PR tags from GHCR
        uses: ./.github/actions/ghcr-delete-pr-tags
        with:
          owner: eu-sovereign-cloud
          package: ecp-builder
          pr-number: ${{ github.event.pull_request.number }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # JOB: Detect which modules changed
  # ===========================================================================
  module-diff:
    name: Detect Changed Modules
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
      has_changes: ${{ steps.filter.outputs.changes != '[]' }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            foundation/persistence:
              - 'foundation/persistence/**'
            foundation/gateway:
              - 'foundation/gateway/**'
            foundation/delegator:
              - 'foundation/delegator/**'
            foundation/plugin/aruba:
              - 'foundation/plugin/aruba/**'
            foundation/plugin/dummy:
              - 'foundation/plugin/dummy/**'
            foundation/plugin/ionos:
              - 'foundation/plugin/ionos/**'

  # ===========================================================================
  # JOB: Generate API artifacts
  # ===========================================================================
  generate-api:
    name: Generate API artifacts
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: true
      - name: Generate API artifacts
        run: |
          make -C foundation/persistence generate-all
      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::make generate-all produced changes. Please run 'make -C foundation/persistence generate-all' and commit the results."
            git diff
            git status
            exit 1
          fi

  # ===========================================================================
  # JOB: Workspace sync check
  # ===========================================================================
  workspace-sync:
    name: Workspace Sync Check
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: true
      - name: Run go work sync and vendor
        run: |
          go work sync
          go work vendor
      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::go work sync/vendor produced changes. Please run 'go work sync && go work vendor' and commit the results."
            git diff
            git status
            exit 1
          fi

  # ===========================================================================
  # JOB: Tests (per changed module, inside builder container)
  # ===========================================================================
  test:
    needs: [module-diff, builder-publish-pr]
    if: github.event.action != 'closed' && needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Test (${{ matrix.module }})
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Run tests
        run: make ${{ matrix.module }}-test

  # ===========================================================================
  # JOB: Lint via golangci-lint (per changed module, inside builder container)
  # ===========================================================================
  lint:
    needs: [module-diff, builder-publish-pr]
    if: github.event.action != 'closed' && needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Lint (${{ matrix.module }})
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Run golangci-lint
        run: make ${{ matrix.module }}-lint

  # ===========================================================================
  # JOB: Vulnerability check via govulncheck (per changed module)
  #
  # Runs inside the per-PR builder image so the govulncheck version matches the
  # pinned GOVULNCHECK_VERSION in .config.mk — no @latest drift, no setup-go.
  # The Makefile target (%-govulncheck in Makefile) sets GOWORK=off to force
  # single-module mode.
  # ===========================================================================
  govulncheck:
    needs: [module-diff, builder-publish-pr]
    if: github.event.action != 'closed' && needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Vuln (${{ matrix.module }})
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Run govulncheck
        run: make ${{ matrix.module }}-govulncheck

  # ===========================================================================
  # JOB: Security scanning via gosec (per changed module, inside builder container)
  # ===========================================================================
  gosec:
    needs: [module-diff, builder-publish-pr]
    if: github.event.action != 'closed' && needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Gosec (${{ matrix.module }})
    container:
      image: ghcr.io/eu-sovereign-cloud/ecp-builder:pr-${{ github.event.pull_request.number }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Run gosec
        run: make ${{ matrix.module }}-gosec

  # ===========================================================================
  # JOB: Validate PR title (conventional commits)
  # ===========================================================================
  pr-title:
    name: Validate PR Title
    if: always() && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
