name: Workspace CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Detect which modules changed
  module-diff:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
      has_changes: ${{ steps.filter.outputs.changes != '[]' }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            foundation/persistence:
              - 'foundation/persistence/**'
            foundation/gateway:
              - 'foundation/gateway/**'
            foundation/delegator:
              - 'foundation/delegator/**'
            foundation/plugin/aruba:
              - 'foundation/plugin/aruba/**'
            foundation/plugin/ionos:
              - 'foundation/plugin/ionos/**'

  # JOB 2: Generate API artifacts
  generate-api:
    name: Generate API artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: true
      - name: Generate API artifacts
        run: |
          make -C foundation/persistence generate-all
      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::make generate-all produced changes. Please run 'make -C foundation/persistence generate-all' and commit the results."
            git diff
            git status
            exit 1
          fi

  # JOB 3: Workspace sync check
  workspace-sync:
    name: Workspace Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: true
      - name: Run go work sync and vendor
        run: |
          go work sync
          go work vendor
      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::go work sync/vendor produced changes. Please run 'go work sync && go work vendor' and commit the results."
            git diff
            git status
            exit 1
          fi

  # JOB 4: Build, Test & Lint
  checks:
    needs: module-diff
    if: needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Check (${{ matrix.module }})
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - uses: actions/setup-go@v6
        with:
          go-version-file: "${{ matrix.module }}/go.mod"
          cache: true
          cache-dependency-path: "${{ matrix.module }}/go.sum"
          check-latest: 'true'

      - name: Run Tests
        run: go test -race -v ./${{ matrix.module }}/...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          only-new-issues: true
          working-directory: ${{ matrix.module }}
          args: --timeout 10m0s --verbose

  # JOB 5: govulncheck and gosec
  security:
    needs: module-diff
    if: needs.module-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-diff.outputs.modules) }}
    name: Security (${{ matrix.module }})
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - uses: actions/setup-go@v6
        with:
          go-version-file: "${{ matrix.module }}/go.mod"
          cache: true
          check-latest: 'true'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./${{ matrix.module }}/...'

  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
